# GMAI-Pulse Phase-1 Metric Registry
# ------------------------------------------------------------------
# version: 0.2.0 (2026-07-08)
# generated_from: new_data/data_profile_summary.json (profiler v0.1.0, run 2026-07-02)
# seed_source: CoverMe data dictionary rows where Notes == "Anomaly Detection"
#              -> confirmed counts: 9 (data_feed_columns) + 8 (post_eVar) + 12 (post_event_list) = 29
#
# STATUS: EXTRACTED. v0.2.0 fills all 29 placeholders from the business-confirmed
# extraction of the dictionary workbook (row list provided 2026-07-08). Per-sheet
# counts match the v0.1.0 seed prediction exactly (9 / 8 / 12). Closes open task #3
# in 10-data-profile-alignment.md.
#
# validation_rules:
#   - every source_ref must exist in data_profile_summary.json for its sheet
#   - per-sheet entry counts must equal the seed counts (9 / 8 / 12)
#   - metric_id unique; grain in {daily, hourly}; status in {active, candidate, deferred}
#   - direction in {higher_is_good, higher_is_bad, context_dependent}
# ------------------------------------------------------------------

meta:
  version: 0.2.0
  updated: 2026-07-08
  default_grain: daily          # hourly reserved — enable only after >=30-day feed confirms volume
  domains: [coverme, gwam_retirement]
  notes: >
    One canonical Adobe hit schema serves both domains (ADR-0006); entries default to
    domain: shared unless a metric is proven domain-specific. No metric columns exist
    in the hit schema — every metric here is a downstream aggregate of decoded
    post_event_list events or column/eVar population rates (02 §2).
  report_suite_caveat: >
    The eVar slot numbers and post_event_list IDs below are CoverMe report-suite
    mappings. The GWAM manulifeglobalprod suite exposes different IDs (EDA S6
    observed 10000-10099, 500-504, 20 — all unresolved); GWAM needs its own
    dictionary / event-lookup extraction before these definitions transfer.

# ------------------------------------------------------------------
# 1) data_feed_columns — 9 tagged rows (traffic / behavioral columns)
#    These are slicing dimensions / coverage signals, not counters:
#    the per-grain metric is the non-blank population rate (and, for
#    geo/os, the value-distribution shift monitored in Phase 1 class C).
# ------------------------------------------------------------------
data_feed_columns:   # exactly 9 entries (seed count 9)
  - metric_id: dfc_campaign
    name: Tracking Code (campaign)
    domain: shared
    source_sheet: data_feed_columns
    source_ref: campaign
    decode_rule: population-rate
    grain: daily
    direction: context_dependent
    owner: TBD
    status: candidate
  - metric_id: dfc_geo_city
    name: Geo City
    domain: shared
    source_sheet: data_feed_columns
